services:
  okey101:
    container_name: okey101-app
    build:
      context: .
      args:
        VITE_SERVER_URL: "${VITE_SERVER_URL}"
    ports:
      - "3001:3001"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3001
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - web

networks:
  web:
    external: true

