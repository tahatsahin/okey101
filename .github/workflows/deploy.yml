name: CI/CD

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install --legacy-peer-deps
      - run: npm -w apps/server test
      - run: npm -w apps/web run build
        env:
          VITE_SERVER_URL: "http://localhost:3001"

  deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DO_SSH_KEY }}
      - name: Deploy to VPS
        env:
          DO_HOST: ${{ secrets.DO_HOST }}
          DO_USER: ${{ secrets.DO_USER }}
          DO_PORT: ${{ secrets.DO_PORT }}
          DO_APP_PATH: ${{ secrets.DO_APP_PATH }}
          VITE_SERVER_URL: ${{ secrets.VITE_SERVER_URL }}
          REPO_URL: https://github.com/${{ github.repository }}.git
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          PORT_ARG=""
          if [ -n "$DO_PORT" ]; then
            PORT_ARG="-p $DO_PORT"
          fi
          ssh $PORT_ARG -o StrictHostKeyChecking=no $DO_USER@$DO_HOST \
            "REPO_URL=$REPO_URL GH_TOKEN=$GH_TOKEN DO_APP_PATH=$DO_APP_PATH VITE_SERVER_URL=$VITE_SERVER_URL bash -s" <<'REMOTE'
set -e
if [ -z "$GH_TOKEN" ]; then
  echo "GH_TOKEN is required for private repo access"
  exit 1
fi
if [ -z "$REPO_URL" ]; then
  echo "REPO_URL is required"
  exit 1
fi
if [ -z "$DO_APP_PATH" ]; then
  echo "DO_APP_PATH is required"
  exit 1
fi

AUTH_URL="https://x-access-token:${GH_TOKEN}@${REPO_URL#https://}"

if [ ! -d "$DO_APP_PATH/.git" ]; then
  mkdir -p "$DO_APP_PATH"
  cd "$DO_APP_PATH"
  git init
fi

cd "$DO_APP_PATH"
if git remote get-url origin >/dev/null 2>&1; then
  git remote set-url origin "$AUTH_URL"
else
  git remote add origin "$AUTH_URL"
fi

git config --global --add safe.directory "$DO_APP_PATH"
git fetch --all --prune

TARGET_REF=""
if git symbolic-ref --quiet refs/remotes/origin/HEAD >/dev/null 2>&1; then
  TARGET_REF=$(git symbolic-ref --quiet refs/remotes/origin/HEAD | sed 's#^refs/remotes/##')
fi
if [ -z "$TARGET_REF" ]; then
  if git show-ref --verify --quiet refs/remotes/origin/main; then
    TARGET_REF="origin/main"
  elif git show-ref --verify --quiet refs/remotes/origin/master; then
    TARGET_REF="origin/master"
  fi
fi
if [ -z "$TARGET_REF" ]; then
  echo "No remote branch found on origin"
  exit 1
fi

git reset --hard "$TARGET_REF"
git remote set-url origin "$REPO_URL"

VITE_SERVER_URL="$VITE_SERVER_URL" docker compose up -d --build
REMOTE
